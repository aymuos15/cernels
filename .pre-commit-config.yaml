repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run --no-sync ruff check --fix
        language: system
        types: [python]
      - id: ruff-format
        name: ruff format
        entry: uv run --no-sync ruff format
        language: system
        types: [python]
      - id: pyrefly
        name: pyrefly
        entry: uv run --no-sync pyrefly check
        language: system
        types: [python]
        pass_filenames: false
      - id: clang-format
        name: clang-format
        entry: uv run --no-sync clang-format -i
        language: system
        files: \.(cu|cuh|cpp|cc|h|hpp)$
